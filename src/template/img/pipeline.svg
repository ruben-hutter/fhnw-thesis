<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <rect width="800" height="360" fill="#ffffff"/>
  <!-- Input -->
  <rect x="40" y="140" width="150" height="80" rx="8" fill="#2d373c"/>
  <text x="115" y="185" text-anchor="middle" fill="#ffffff" font-family="Roboto, Arial, sans-serif" font-size="18" font-weight="bold">Input Data</text>
  <!-- Processing -->
  <rect x="325" y="60" width="150" height="70" rx="8" fill="#fde70e"/>
  <text x="400" y="102" text-anchor="middle" fill="#2d373c" font-family="Roboto, Arial, sans-serif" font-size="17" font-weight="bold">Preprocess</text>
  <rect x="325" y="155" width="150" height="70" rx="8" fill="#006e6e"/>
  <text x="400" y="197" text-anchor="middle" fill="#ffffff" font-family="Roboto, Arial, sans-serif" font-size="17" font-weight="bold">Model</text>
  <rect x="325" y="250" width="150" height="70" rx="8" fill="#fde70e"/>
  <text x="400" y="292" text-anchor="middle" fill="#2d373c" font-family="Roboto, Arial, sans-serif" font-size="17" font-weight="bold">Validate</text>
  <!-- Output -->
  <rect x="610" y="140" width="150" height="80" rx="8" fill="#d20537"/>
  <text x="685" y="185" text-anchor="middle" fill="#ffffff" font-family="Roboto, Arial, sans-serif" font-size="18" font-weight="bold">Result</text>
  <!-- Arrows -->
  <line x1="190" y1="180" x2="315" y2="95" stroke="#8c9196" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="190" y1="180" x2="315" y2="190" stroke="#8c9196" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="190" y1="180" x2="315" y2="285" stroke="#8c9196" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="475" y1="95" x2="600" y2="175" stroke="#8c9196" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="475" y1="190" x2="600" y2="180" stroke="#8c9196" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="475" y1="285" x2="600" y2="185" stroke="#8c9196" stroke-width="2.5" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8c9196"/>
    </marker>
